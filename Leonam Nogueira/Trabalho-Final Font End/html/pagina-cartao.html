<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serrapet - Pagamento</title>
    <link rel="stylesheet" href="../css/cartaocredito.css">
    <link rel="stylesheet" href="../css/cabecalho.css">
</head>
<body>

    <header class="cabecalho-principal">
        <div class="logo">
            <img src="../img/logo.png" alt="Logo Serrapet" width="200">
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="adocao.html">Adote</a></li>
                <li><a href="doacao.html" class="ativo">Doações</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="conteudo-principal">
        <div class="card-container">
            <h2>Pagamento com Cartão</h2>
            
            <form id="paymentForm">
                <!-- Campo de Valor Adicionado -->
                <div class="field">
                    <label for="amount">Valor da Doação (R$)</label>
                    <input type="number" id="amount" placeholder="Ex: 50.00" step="0.01" min="1" required>
                </div>

                <div class="field">
                    <label for="cardNumber">Número do Cartão</label>
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>

                <div class="field">
                    <label for="cardName">Nome no Cartão</label>
                    <input type="text" id="cardName" placeholder="NOME COMO IMPRESSO" required>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="expiryDate">Validade</label>
                        <input type="text" id="expiryDate" placeholder="MM/AA" maxlength="5" required>
                    </div>

                    <div class="field">
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="4" required>
                    </div>
                </div>

                <button type="submit" class="pay-btn">Confirmar Pagamento</button>
            </form>
        </div>
    </main>

    <footer class="py-4" style="background-color: #483C46; color: white;">
        <div style="text-align: center; width: 100%;">
            <p style="margin-bottom: 10px;">&copy; 2026 SerraPet - Projeto Front End Essencial</p>
            <div class="social-links">
                <a href="https://www.instagram.com/serrapet/" target="_blank" style="color: white; text-decoration: none; font-weight: bold;">Instagram @serrapet</a>
            </div>
        </div>
    </footer>

    <script src="../js/cartaocredito.js"></script>
</body>
</html>
