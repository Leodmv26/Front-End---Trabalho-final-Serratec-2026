<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos - SerraPet</title>

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="componentes.css">

    <!--Biblioteca para links redes sociais-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header class="layout-cabecalho layout-cabecalho--position">
        <div class="container">
            <img src="../img/SerraPet_1.png" alt="Logo SerraPet" width="200">

        </div>


    </header>

    <main class="pagina-contatos">

        <div class="animacao">
            <img src="../img/SerraPet_13.png" alt="Caomarron" width="300">
        </div>

        <div class="main-content">

            <section>
                <h2>Fale conosco</h2>

                <p>
                    <a href="tel:+5524912345678">
                        <i class="fa-solid fa-phone"></i> 24912345678
                    </a>
                </p>

                <p>
                    <a href="https://wa.me/5524912345678" target="_blank">
                        <i class="fa-brands fa-whatsapp"></i> 24912345678
                    </a>
                </p>

                <p>
                    <a href="mailto:serrapet@gmail.com">
                        <i class="fa-solid fa-envelope"></i> serrapet@gmail.com
                    </a>
                </p>
            </section>

            <section>
                <h2>Redes Sociais</h2>

                <p>
                    <a href="#" target="_blank">
                        <i class="fa-brands fa-instagram"></i> Instagran

                    </a>
                </p>

                <p>
                    <a href="#" target="_blank">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </a>
                </p>
            </section>

        </div>

        <section class="secao-formulario">
            <h2>Envie sua dúvida</h2>

            <form>
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" rows="5"></textarea><br><br>

                <button type="submit">Enviar</button>
            </form>
        </section>

    </main>

    <footer class="layout-rodape">
        <div>
            <p>TERMOS DE USO</p>
            <p>|</p>
            <p>POLÍTICA DE PRIVACIDADE</p>
            <p>|</p>
            <p>TODOS OS DIREITOS RESERVADOS</p>
            <p>© 2026 SerraPet</p>
        </div>
    </footer>
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <script src="../js/contatos.js"></script>
</body>

</html>
